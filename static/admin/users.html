<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Admin Access Required - Finanza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        // Guard: redirect to real admin panel if authenticated, otherwise to login
        (function() {
            var token = localStorage.getItem('token');
            if (token) {
                fetch('/api/v1/users/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(function(r) {
                    if (r.ok) return r.json();
                    throw new Error('Unauthorized');
                }).then(function(user) {
                    if (user && (user.is_admin || user.admin_role)) {
                        window.location.replace('/user/admin/users');
                    } else {
                        window.location.replace('/signin?next=/admin');
                    }
                }).catch(function() {
                    localStorage.removeItem('token');
                    window.location.replace('/signin?next=/admin');
                });
            } else {
                window.location.replace('/signin?next=/admin');
            }
        })();
    </script>
</head>
<body>
    <p style="font-family:sans-serif;text-align:center;margin-top:20vh;color:#666;">
        Redirecting&hellip;
    </p>
</body>
</html>
